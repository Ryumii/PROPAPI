name: Deploy API

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-api:
    name: "API → Azure"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push Docker Image
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/propapi-api"
          docker build -f docker/api.prod.Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-propapi-api \
            --resource-group rg-propapi-prod \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/propapi-api:${{ github.sha }}"
