name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  api-test:
    name: "API — Lint & Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: reapi_test
          POSTGRES_USER: reapi
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://reapi:test_password@localhost:5432/reapi_test
      REDIS_URL: redis://localhost:6379/0
      API_ENV: test
      API_SECRET_KEY: test-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "api/.[dev]"

      - name: Lint (ruff)
        run: ruff check api/

      - name: Type check (mypy)
        run: mypy api/app/ --ignore-missing-imports
        continue-on-error: true

      - name: Test (pytest)
        run: pytest api/tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  web-test:
    name: "Web — Lint & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint (ESLint)
        run: cd web && npm run lint

      - name: Type check (tsc)
        run: cd web && npm run type-check
        continue-on-error: true

      - name: Test (jest)
        run: cd web && npm test
